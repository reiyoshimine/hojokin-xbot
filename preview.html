<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補助金XBot - ダッシュボード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f8fa;
    color: #14171a;
    padding: 20px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #657786; margin-bottom: 16px; }

  /* タブ */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 2px solid #e1e8ed;
  }
  .tab {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #657786;
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }
  .tab:hover { color: #1da1f2; }
  .tab.active { color: #1da1f2; border-bottom-color: #1da1f2; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 共通 */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .controls button {
    padding: 6px 14px;
    border: 1px solid #e1e8ed;
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .controls button:hover { background: #e8f5fd; border-color: #1da1f2; }
  .controls button.active { background: #1da1f2; color: #fff; border-color: #1da1f2; }
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: #fff;
    border: 1px solid #e1e8ed;
    border-radius: 10px;
    padding: 12px 16px;
    flex: 1;
    min-width: 80px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 700; color: #1da1f2; }
  .stat-label { font-size: 11px; color: #657786; margin-top: 2px; }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #657786;
    font-size: 15px;
  }

  /* ツイートカード */
  .tweet-card {
    background: #fff;
    border: 1px solid #e1e8ed;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    transition: box-shadow 0.15s;
  }
  .tweet-card:hover { box-shadow: 0 1px 8px rgba(0,0,0,0.08); }
  .tweet-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #1da1f2;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 18px;
    flex-shrink: 0;
  }
  .tweet-meta { flex: 1; }
  .tweet-name { font-weight: 700; font-size: 14px; }
  .tweet-handle { color: #657786; font-size: 13px; }
  .tweet-date { color: #657786; font-size: 12px; margin-left: auto; white-space: nowrap; }
  .tweet-body {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .tweet-body a { color: #1da1f2; text-decoration: none; }
  .tweet-body a:hover { text-decoration: underline; }
  .tweet-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid #f0f0f0;
  }
  .tweet-type {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .type-new { background: #e8f5e9; color: #2e7d32; }
  .type-update { background: #fff3e0; color: #e65100; }
  .type-daily { background: #e3f2fd; color: #1565c0; }
  .type-casual { background: #f3e5f5; color: #7b1fa2; }
  .tweet-link {
    font-size: 12px;
    color: #1da1f2;
    text-decoration: none;
    margin-left: auto;
  }
  .tweet-link:hover { text-decoration: underline; }
  .char-count { font-size: 11px; color: #aab8c2; }

  /* リサーチレポートカード */
  .report-card {
    background: #fff;
    border: 1px solid #e1e8ed;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .report-card:hover { box-shadow: 0 1px 8px rgba(0,0,0,0.08); }
  .report-date {
    font-size: 12px;
    color: #657786;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .report-date-icon { font-size: 14px; }
  .report-summary {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: #f0f7ff;
    border-radius: 8px;
    color: #14171a;
  }
  .report-section {
    margin-bottom: 10px;
  }
  .report-section-title {
    font-size: 12px;
    font-weight: 700;
    color: #657786;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .hook-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .hook-label { min-width: 120px; color: #14171a; }
  .hook-bar-bg {
    flex: 1;
    height: 18px;
    background: #eef3f8;
    border-radius: 9px;
    overflow: hidden;
  }
  .hook-bar-fill {
    height: 100%;
    border-radius: 9px;
    transition: width 0.3s;
  }
  .hook-weight { font-size: 12px; color: #657786; min-width: 35px; text-align: right; }
  .tag-chip {
    display: inline-block;
    padding: 3px 10px;
    background: #e8f5fd;
    color: #1da1f2;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    margin: 2px 4px 2px 0;
  }
  .report-meta {
    font-size: 12px;
    color: #aab8c2;
    display: flex;
    gap: 16px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #f0f0f0;
  }

  /* バズコレクション */
  .buzz-batch-date {
    font-size: 12px;
    color: #657786;
    font-weight: 600;
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .buzz-card {
    background: #fff;
    border: 1px solid #e1e8ed;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .buzz-card:hover { box-shadow: 0 1px 8px rgba(0,0,0,0.08); }
  .buzz-rank {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    background: #ff9800;
    border-radius: 10px;
    padding: 2px 8px;
  }
  .buzz-rank.top1 { background: #e53935; }
  .buzz-rank.top2 { background: #ff5722; }
  .buzz-rank.top3 { background: #ff9800; }
  .buzz-text {
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 8px;
    padding-right: 50px;
  }
  .buzz-text a { color: #1da1f2; text-decoration: none; }
  .buzz-metrics {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #657786;
    align-items: center;
  }
  .buzz-metric { display: flex; align-items: center; gap: 4px; }
  .buzz-score {
    font-size: 11px;
    font-weight: 700;
    color: #e53935;
    margin-left: auto;
  }
  .buzz-source {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    background: #f0f0f0;
    color: #657786;
  }
</style>
</head>
<body>

<div class="container">
  <h1>補助金XBot - ダッシュボード</h1>
  <p class="subtitle">@japanhojokin</p>

  <div class="tabs">
    <button class="tab active" data-tab="posts">投稿履歴</button>
    <button class="tab" data-tab="research">リサーチレポート</button>
    <button class="tab" data-tab="buzz">バズ集</button>
  </div>

  <!-- 投稿履歴タブ -->
  <div class="tab-panel active" id="panel-posts">
    <div class="stats" id="stats"></div>
    <div class="controls" id="controls">
      <button class="active" data-filter="all">すべて</button>
      <button data-filter="new">新規</button>
      <button data-filter="update">更新</button>
      <button data-filter="daily">ピックアップ</button>
      <button data-filter="casual">つぶやき</button>
    </div>
    <div id="feed"></div>
  </div>

  <!-- リサーチレポートタブ -->
  <div class="tab-panel" id="panel-research">
    <div class="stats" id="research-stats"></div>
    <div id="reports"></div>
  </div>

  <!-- バズコレクションタブ -->
  <div class="tab-panel" id="panel-buzz">
    <div class="stats" id="buzz-stats"></div>
    <div id="buzz-feed"></div>
  </div>
</div>

<script>
// --- 共通 ---
const TYPE_LABELS = { new: '新規', update: '更新', daily: 'ピックアップ', casual: 'つぶやき' };
const TYPE_CLASS = { new: 'type-new', update: 'type-update', daily: 'type-daily', casual: 'type-casual' };
const PATTERN_LABELS = {
  urgency: '締切カウントダウン',
  amount: '金額インパクト',
  loss_aversion: '損失回避',
  question: '疑問形フック',
  novelty: '新着告知',
  sharing: '共有・紹介',
  other: 'その他',
};
const PATTERN_COLORS = {
  urgency: '#e53935',
  amount: '#1da1f2',
  loss_aversion: '#ff9800',
  question: '#7c4dff',
  novelty: '#43a047',
  sharing: '#00acc1',
  other: '#90a4ae',
};

function linkifyUrls(text) {
  return text.replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
}
function formatDateTime(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
function tweetDisplayLen(text) {
  const urls = text.match(/https?:\/\/\S+/g) || [];
  let len = text.length;
  for (const u of urls) len += 23 - u.length;
  return len;
}

// --- 投稿タブ ---
function renderStats(history) {
  const total = history.length;
  const counts = { new: 0, update: 0, daily: 0, casual: 0 };
  history.forEach(h => counts[h.type] = (counts[h.type] || 0) + 1);
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">総投稿数</div></div>
    <div class="stat-box"><div class="stat-num">${counts.new}</div><div class="stat-label">新規</div></div>
    <div class="stat-box"><div class="stat-num">${counts.update}</div><div class="stat-label">更新</div></div>
    <div class="stat-box"><div class="stat-num">${counts.daily}</div><div class="stat-label">ピックアップ</div></div>
    <div class="stat-box"><div class="stat-num">${counts.casual}</div><div class="stat-label">つぶやき</div></div>
  `;
}

function renderFeed(history, filter) {
  const feed = document.getElementById('feed');
  const items = filter === 'all' ? history : history.filter(h => h.type === filter);
  if (items.length === 0) {
    feed.innerHTML = '<div class="empty">投稿履歴がありません</div>';
    return;
  }
  feed.innerHTML = items.slice().reverse().map(h => {
    const displayLen = tweetDisplayLen(h.text);
    const tweetUrl = h.tweetId ? `https://x.com/japanhojokin/status/${h.tweetId}` : '';
    return `
      <div class="tweet-card">
        <div class="tweet-header">
          <div class="avatar">補</div>
          <div class="tweet-meta">
            <div class="tweet-name">補助金情報bot</div>
            <div class="tweet-handle">@japanhojokin</div>
          </div>
          <div class="tweet-date">${formatDate(h.postedAt || h.date)}</div>
        </div>
        <div class="tweet-body">${linkifyUrls(h.text.replace(/</g,'&lt;').replace(/>/g,'&gt;'))}</div>
        <div class="tweet-footer">
          <span class="tweet-type ${TYPE_CLASS[h.type] || ''}">${TYPE_LABELS[h.type] || h.type}</span>
          <span class="char-count">${displayLen}/280</span>
          ${tweetUrl ? `<a class="tweet-link" href="${tweetUrl}" target="_blank" rel="noopener">Xで見る</a>` : ''}
        </div>
      </div>`;
  }).join('');
}

// --- リサーチタブ ---
function renderResearchStats(reports) {
  const el = document.getElementById('research-stats');
  if (reports.length === 0) {
    el.innerHTML = '';
    return;
  }
  const latest = reports[reports.length - 1];
  const topHook = latest.hookRanking?.[0];
  el.innerHTML = `
    <div class="stat-box"><div class="stat-num">${reports.length}</div><div class="stat-label">分析回数</div></div>
    <div class="stat-box"><div class="stat-num">${latest.sources?.total || 0}</div><div class="stat-label">最新サンプル数</div></div>
    <div class="stat-box"><div class="stat-num">${topHook ? PATTERN_LABELS[topHook.pattern] || topHook.pattern : '-'}</div><div class="stat-label">最強フック</div></div>
    <div class="stat-box"><div class="stat-num">${latest.ownPerformance?.avgLikes ?? '-'}</div><div class="stat-label">平均いいね</div></div>
  `;
}

function renderReports(reports) {
  const el = document.getElementById('reports');
  if (reports.length === 0) {
    el.innerHTML = '<div class="empty">リサーチレポートがありません</div>';
    return;
  }
  el.innerHTML = reports.slice().reverse().map((r, idx) => {
    const num = reports.length - idx;
    const hookBars = (r.hookRanking || []).map(h => `
      <div class="hook-bar">
        <span class="hook-label">${PATTERN_LABELS[h.pattern] || h.pattern}</span>
        <div class="hook-bar-bg">
          <div class="hook-bar-fill" style="width:${Math.round(h.weight*100)}%;background:${PATTERN_COLORS[h.pattern] || '#90a4ae'}"></div>
        </div>
        <span class="hook-weight">${h.weight}</span>
      </div>`).join('');

    const tags = (r.topHashtags || []).map(t =>
      `<span class="tag-chip">${t.tag} (${t.weight})</span>`
    ).join('');

    return `
      <div class="report-card">
        <div class="report-date">
          <span class="report-date-icon">&#x1F4CA;</span>
          <strong>レポート #${num}</strong> &mdash; ${formatDateTime(r.date)}
        </div>
        ${r.summary ? `<div class="report-summary">${r.summary}</div>` : ''}
        <div class="report-section">
          <div class="report-section-title">フックパターン効果</div>
          ${hookBars}
        </div>
        ${tags ? `<div class="report-section"><div class="report-section-title">トップハッシュタグ</div>${tags}</div>` : ''}
        <div class="report-meta">
          <span>行数: ${r.structure?.optimalLines?.[0] || '?'}〜${r.structure?.optimalLines?.[1] || '?'}行</span>
          <span>CTA率: ${r.structure?.ctaRate ?? '?'}%</span>
          <span>ソース: ${r.sources?.total || 0}件</span>
        </div>
      </div>`;
  }).join('');
}

// --- バズコレクションタブ ---
const SOURCE_LABELS = { own: '自ツイート', search: '検索', seeds: 'シード', history: '履歴', own_with_metrics: '自ツイート', web_search: 'Web検索', manual: 'シード' };

function renderBuzzStats(collection) {
  const el = document.getElementById('buzz-stats');
  if (!collection || collection.length === 0) { el.innerHTML = ''; return; }
  const totalTweets = collection.reduce((s, b) => s + b.tweets.length, 0);
  const allScores = collection.flatMap(b => b.tweets.map(t => t.score));
  const maxScore = allScores.length > 0 ? Math.max(...allScores) : 0;
  el.innerHTML = `
    <div class="stat-box"><div class="stat-num">${totalTweets}</div><div class="stat-label">蓄積ツイート数</div></div>
    <div class="stat-box"><div class="stat-num">${collection.length}</div><div class="stat-label">収集回数</div></div>
    <div class="stat-box"><div class="stat-num">${maxScore.toFixed(0)}</div><div class="stat-label">最高スコア</div></div>
  `;
}

function renderBuzzFeed(collection) {
  const el = document.getElementById('buzz-feed');
  if (!collection || collection.length === 0) {
    el.innerHTML = '<div class="empty">バズツイートはまだ収集されていません</div>';
    return;
  }
  el.innerHTML = collection.slice().reverse().map(batch => {
    const dateStr = formatDateTime(batch.collectedAt);
    const cards = batch.tweets.map((t, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const tweetUrl = t.tweetId ? `https://x.com/i/status/${t.tweetId}` : '';
      return `
        <div class="buzz-card">
          <span class="buzz-rank ${rankClass}">#${i + 1}</span>
          <div class="buzz-text">${linkifyUrls((t.text || '').replace(/</g,'&lt;').replace(/>/g,'&gt;'))}</div>
          <div class="buzz-metrics">
            <span class="buzz-metric">❤️ ${t.metrics?.likes || 0}</span>
            <span class="buzz-metric">🔁 ${t.metrics?.retweets || 0}</span>
            <span class="buzz-metric">💬 ${t.metrics?.replies || 0}</span>
            <span class="buzz-source">${SOURCE_LABELS[t.source] || t.source}</span>
            ${tweetUrl ? `<a class="tweet-link" href="${tweetUrl}" target="_blank" rel="noopener">Xで見る</a>` : ''}
            <span class="buzz-score">Score: ${t.score?.toFixed(1) || '?'}</span>
          </div>
        </div>`;
    }).join('');
    return `<div class="buzz-batch-date">🏆 ${dateStr} に収集</div>${cards}`;
  }).join('');
}

// --- 初期化 ---
async function init() {
  let history = [], reports = [], buzzCollection = [];
  try { history = await (await fetch('./state/history.json')).json(); } catch {}
  try { reports = await (await fetch('./state/research-reports.json')).json(); } catch {}
  try { buzzCollection = await (await fetch('./state/buzz-collection.json')).json(); } catch {}

  renderStats(history);
  renderFeed(history, 'all');
  renderResearchStats(reports);
  renderReports(reports);
  renderBuzzStats(buzzCollection);
  renderBuzzFeed(buzzCollection);

  document.getElementById('controls').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed(history, btn.dataset.filter);
  });

  document.querySelector('.tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
}
init();
</script>
</body>
</html>
