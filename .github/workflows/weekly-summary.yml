name: 補助金XBot - 週次まとめスレッド

on:
  schedule:
    # 毎週日曜 10:00 JST = 01:00 UTC
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（実際に投稿しない）'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: リサーチリポから index.html を取得（全履歴）
        env:
          GH_TOKEN: ${{ secrets.RESEARCH_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/reiyoshimine/subsidy-research-bot.git /tmp/research-repo
          cp /tmp/research-repo/index.html ./index.html

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install --no-audit --no-fund

      - name: 週次まとめスレッドを投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          REPORT_URL: 'https://github.com/reiyoshimine/subsidy-research-bot'
        run: node scripts/post-weekly-summary.js
