name: 補助金XBot - バズリサーチ

on:
  schedule:
    # 毎日 06:00 JST (21:00 UTC前日) と 18:00 JST (09:00 UTC)
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（保存しない）'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install --no-audit --no-fund

      - name: バズリサーチ実行
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_API_TIER: ${{ secrets.X_API_TIER }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: node scripts/research-buzz.js

      - name: インサイトファイルをコミット
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/buzz-insights.json state/research-reports.json
          if ! git diff --cached --quiet; then
            git commit -m "バズリサーチ結果更新 [skip ci]"
            git push
          else
            echo "インサイトに変更なし"
          fi
